name: Playwright E2E

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      suite:
        description: "Test suite"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - guest
          - user
          - admin
          - all

  push:
    branches:
      - stg
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve environment
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.ref_name }}" = "main" ]; then
              echo "PLAYWRIGHT_BASE_URL=${{ secrets.PLAYWRIGHT_BASE_URL_PRODUCTION }}" >> $GITHUB_ENV
            else
              echo "PLAYWRIGHT_BASE_URL=${{ secrets.PLAYWRIGHT_BASE_URL_STAGING }}" >> $GITHUB_ENV
            fi
          else
            if [ "${{ github.event.inputs.environment }}" = "production" ]; then
              echo "PLAYWRIGHT_BASE_URL=${{ secrets.PLAYWRIGHT_BASE_URL_PRODUCTION }}" >> $GITHUB_ENV
            else
              echo "PLAYWRIGHT_BASE_URL=${{ secrets.PLAYWRIGHT_BASE_URL_STAGING }}" >> $GITHUB_ENV
            fi
          fi

      - name: Resolve suite grep
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "PLAYWRIGHT_GREP=@smoke" >> $GITHUB_ENV
          else
            if [ "${{ github.event.inputs.suite }}" = "smoke" ]; then
              echo "PLAYWRIGHT_GREP=@smoke" >> $GITHUB_ENV
            elif [ "${{ github.event.inputs.suite }}" = "regression" ]; then
              echo "PLAYWRIGHT_GREP=@regression" >> $GITHUB_ENV
            elif [ "${{ github.event.inputs.suite }}" = "guest" ]; then
              echo "PLAYWRIGHT_GREP=@guest" >> $GITHUB_ENV
            elif [ "${{ github.event.inputs.suite }}" = "user" ]; then
              echo "PLAYWRIGHT_GREP=@user" >> $GITHUB_ENV
            elif [ "${{ github.event.inputs.suite }}" = "admin" ]; then
              echo "PLAYWRIGHT_GREP=@admin" >> $GITHUB_ENV
            else
              echo "PLAYWRIGHT_GREP=" >> $GITHUB_ENV
            fi
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          if [ -n "$PLAYWRIGHT_GREP" ]; then
            npx playwright test --grep "$PLAYWRIGHT_GREP"
          else
            npx playwright test
          fi
        env:
          PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
          PLAYWRIGHT_USER_EMAIL: ${{ secrets.PLAYWRIGHT_USER_EMAIL }}
          PLAYWRIGHT_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_USER_PASSWORD }}
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          retention-days: 7