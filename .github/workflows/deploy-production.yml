name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to production over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.PROD_APP_DIR }}

            echo "==> Fetch latest code"
            git fetch origin
            git reset --hard origin/main

            echo "==> Set app version"
            export NEXT_PUBLIC_APP_VERSION=$(git rev-parse --short HEAD)

            echo "==> Install dependencies"
            npm ci

            echo "==> Build app"
            npm run build:versioned

            echo "==> Restart PM2"
            pm2 restart ${{ secrets.PROD_PM2_APP_NAME }} --update-env

            echo "==> Verify PM2 process"
            pm2 describe ${{ secrets.PROD_PM2_APP_NAME }}

            echo "==> Deployed version:"
            git rev-parse --short HEAD

  smoke-production:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set production base URL
        run: echo "PLAYWRIGHT_BASE_URL=${{ secrets.PLAYWRIGHT_BASE_URL_PRODUCTION }}" >> $GITHUB_ENV

      - name: Wait for production to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS "$PLAYWRIGHT_BASE_URL/login" > /dev/null; then
              echo "Production is ready"
              exit 0
            fi
            echo "Waiting for production..."
            sleep 10
          done
          echo "Production did not become ready in time"
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke tests on production
        run: npx playwright test --grep "@smoke"
        env:
          PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
          PLAYWRIGHT_USER_EMAIL: ${{ secrets.PLAYWRIGHT_USER_EMAIL }}
          PLAYWRIGHT_USER_PASSWORD: ${{ secrets.PLAYWRIGHT_USER_PASSWORD }}
          PLAYWRIGHT_SUPABASE_URL: ${{ secrets.PLAYWRIGHT_SUPABASE_URL_PRODUCTION }}
          PLAYWRIGHT_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PLAYWRIGHT_SUPABASE_SERVICE_ROLE_KEY_PRODUCTION }}
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production-smoke
          path: playwright-report
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-production-smoke
          path: test-results
          retention-days: 7